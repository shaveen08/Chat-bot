<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/src/css/index.css" />
  </head>
  <body>
    <main class="main-container">
      <!-- Banner Container -->
      <div class="banner-container">
      </div>
      <!-- Login Container -->
      <div class="login-container">
          <!-- Form -->
          <form class="form-container" onsubmit="handleFormSubmit(event)">
            <!-- Login Container Header -->
            <div class="header">
              <h2>Nice to see you again!</h2>
              <p>Please enter your details to access your account.</p>
              <span id="login-error" class="error-message"></span>
            </div>
            <!-- Email -->
            <div class="user-input">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="myname@example.com" autocomplete="off" onblur="validateEmail()">
                <span id="email-error" class="error-message"></span>
            </div>
            <!-- Password -->
            <div class="user-input">
                <label for="pwd">Password</label>
                <input type="password" id="pwd" name="password" placeholder="Myname@123" autocomplete="off" onblur="validatePassword()">
                <span id="password-error" class="error-message"></span>
            </div>
            <!-- Sumbit -->
            <div class="sumbit-button">
                <button type="submit">Log in</button>
            </div>
            <!-- Or continue with -->
            <div class="or-splitter">
                <div><p>Or Continue With</p></div>
            </div>
            <!-- Alternate Login -->
            <div class="alternate-login">
            <button type="button">Google</button>
            <button type="button">Apple</button>
            </div>
            <!-- Register Account -->
            <div class="register-account">
                <p>Don't have an account? <a href="/src/html/registeration.html">Register</a></p>
            </div>
        </form>
      </div>
    </main>
    <script src="/src/javascript/index.js"></script>
  </body>
</html>
